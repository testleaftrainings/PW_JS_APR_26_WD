What is JavaScript
-------------------
JavaScript is a lightweight, interpreted, scripting language used to 
create dynamic and interactive web pages.

Why JavaScript is used
----------------------
It allows web pages to respond to user actions like clicks, typing, and navigation 
without reloading the page.

Problem it solves
-----------------
HTML gives structure and CSS gives style, but JavaScript adds behavior and logic to 
make web applications interactive and functional.

Key points
----------
Runs in the browser (client-side)
Can also run on server using Node.js
Supports OOP, functional, and event-driven programming
Widely used in automation tools like Playwright


Interpreter
-----------
An interpreter reads, translates, and executes code line by line at runtime.

Why used
--------
Simple execution model and easy debugging.

Problem it solves
-----------------
Allows code to run without a separate compilation step.


JIT (Just-In-Time Compiler)
---------------------------
JIT compiles code into machine code at runtime, just before execution.

Why used
---------
Improves performance by converting frequently used code into optimized native code.

Problem it solves
-----------------
Reduces execution time compared to pure interpretation.

Key Differences
---------------

Interpreter
-----------
Executes line by line
Slower execution
No optimization
Errors shown line by line

JIT Compiler
------------
Compiles during runtime
Faster execution
Optimizes hot code paths
Better performance for large applications



js -->transpiled 
  parsing the code -->byte code exe -->binaries(0's and 1's)

jit compiler
  variables -->a,b
   expressions--> *
 
DataTypes in JavaScript
-----------------------

DataTypes: A data type defines the type of value a variable can store 
and the operations that can be performed on that value.

Primitive DataTypes:A primitive is a basic data type that holds a single immutable
-------------------- 
value and is not an object.

1) Number

The Number data type is used to store all kinds of numeric values, including whole 
numbers and decimal numbers.

Example
var age = 25;
var Price=99.99

2) String
Stores a sequence of characters or text values. A string is can be written inside single 
quotes (' '), double quotes (" "), or backticks (` `).

var name = "John";
var city = 'Chennai';
var message = `Welcome to Playwright`;

3) Boolean
The Boolean data type is used when a value can have only two possible states: 
true or false. It is commonly used in conditions and decision making.

let isLoggedIn = true;
let isCompleted = false;

4) undefined
The undefined data type means the variable exists, but no value has been given yet.

var age;
console.log(age); // undefined

5) Null
The null data type is used when we intentionally set a variable to have no value.
var user = null;
console.log(user); // null

6) Big Int

Used to store very large integers beyond the safe limit of Number.

JavaScript number safe range is from (-2^53 - 1) to (2^53 - 1)
-9007199254740991 to 9007199254740991

If you go beyond this range — JS loses precision
var num = 9007199254740992;

JavaScript **can't guarantee accuracy**, and you'll get the `ts(80008)` warning in 
TypeScript because the value might be **rounded**, **inaccurate**, or **unexpected**.

• BigInt is used for very large integers
• Add n at the end of the number to create BigInt
• BigInt does not have the safe integer limit like Number
• Cannot mix Number and BigInt directly in operations



Non Primitive DataTypes
------------------------
Non-primitive data types are complex data types that can store multiple values.
They are mutable and stored by reference.

1) Array
--------

Used to store multiple values in a single variable.

let numbers = [10, 20, 30, 40];
console.log(numbers[0]); // 10

2) object
---------

Stores data in key–value pairs.

let user = {
  name: "Sindhu",
  age: 25
};

console.log(user.name); // Sindhu


Variable declaration with Var, Let and const
--------------------------------------------

Variable declaration means creating a variable to store data in memory.

// Declaration : creating variable
var name

// Initialization :assigning value
name = "Sindhu"


// Declaration + Initialization
var age = 25

console.log(name); // Sindhu
console.log(age);  // 25


1) Variable declaration with var Keyword

var-> can be redeclared and reassigned

2) Variable declaration with let Keyword

let-> cannot be redeclared but can be reassigned

3) Variable declaration with const Keyword

const-> cannot be redeclared and cannot be reassigned


Hoisting
--------

Hoisting is the default behavior of JavaScript where declarations are moved to the 
top of their scope during the memory creation phase before execution.

var -> Hoisted and initialized with undefined
let-> Hoisted but not initialized → accessing before declaration gives ReferenceError (TDZ)
const-> Hoisted but not initialized → accessing before declaration gives ReferenceError (TDZ)

TDZ(Temporal dead zone)-> The time period between hoisting and initialization of a variable, where
it cannot be accessed.

